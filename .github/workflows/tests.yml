name: tests

# The project's single quality gate (python tests.py) runs on every push
# and pull request. The suite is OS-independent: it exercises the chart
# builders, the .ppttc validator, the deck builders and the server, and
# skips the few checks that need a local think-cell install.
on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run the test suite
        run: python tests.py
